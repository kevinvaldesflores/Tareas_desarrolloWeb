<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Gestión de Empleados</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🏢 Sistema de Gestión de Empleados</h1>
            <p>Administra tu base de datos de empleados de manera sencilla</p>
        </header>

        <!-- Formulario para agregar empleado -->
        <div class="form-container">
            <h2>Agregar Nuevo Empleado</h2>
            <form id="employeeForm">
                <div class="form-group">
                    <label for="nombre">Nombre:</label>
                    <input type="text" id="nombre" name="nombre" required>
                </div>

                <div class="form-group">
                    <label for="apellido">Apellido:</label>
                    <input type="text" id="apellido" name="apellido" required>
                </div>

                <div class="form-group">
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" required>
                </div>

                <div class="form-group">
                    <label for="telefono">Teléfono:</label>
                    <input type="tel" id="telefono" name="telefono" required>
                </div>

                <div class="form-group">
                    <label for="salario">Salario ($):</label>
                    <input type="number" id="salario" name="salario" step="0.01" required>
                </div>

                <div class="form-group">
                    <label for="fechaNacimiento">Fecha de Nacimiento:</label>
                    <input type="date" id="fechaNacimiento" name="fechaNacimiento" required>
                </div>

                <div class="form-group">
                    <label for="imagen">Foto de Perfil (URL opcional):</label>
                    <input type="url" id="imagen" name="imagen" placeholder="https://ejemplo.com/foto.jpg">
                </div>

                <button type="submit" class="btn btn-primary">➕ Agregar Empleado</button>
            </form>
        </div>

        <!-- Lista de empleados -->
        <div class="employees-container">
            <h2>Lista de Empleados</h2>
            <div id="employeesList" class="employees-grid"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
