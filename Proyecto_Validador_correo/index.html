<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Validador de correo electrónico | Expresión regular</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="card">
        <h1>✉️ Validador de email</h1>
        

        <div class="input-group">
            <label for="emailInput">📧 Dirección de correo electrónico</label>
            <div class="campo-wrapper">
                <input type="text" id="emailInput" placeholder="ejemplo@dominio.com" autocomplete="off" spellcheck="false">
            </div>
            <div id="feedbackArea" class="feedback-message neutral-msg">
                ✍️ Escribe un correo para validarlo
            </div>
        </div>

        <div class="regex-info">
            <p>
                <span class="regex-badge"></span>
                <code style="font-size:0.72rem; word-break:break-all;">
              
                </code>
            </p>
            <p style="margin-top: 0.4rem;">
                ✅ Formato aceptado: usuario@dominio.extension    Ejemplo(julio90@gmail.com)
            </p>
        </div>
        <footer>
            🔍 Retroalimentación visual: borde verde ✓ | borde rojo ✗ + mensaje claro
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
